version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-secret}"
      HTTP_USER: ${COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${COMMANDER_PASSWORD:-admin}
    ports:
      - "${COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
